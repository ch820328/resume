<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepan Tsai | Engineering Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent: #3b82f6;
            --accent-success: #10b981;
            --text-gray: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 1.2rem 2rem; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; background: linear-gradient(to right, #6366f1, #10b981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* LEFT PANEL: RESUME HUB */
        .resume-panel {
            width: 380px;
            background: var(--panel-dark);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-title { font-size: 0.75rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; display: block; }
        
        .resume-topic {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .resume-topic:hover { border-color: rgba(59, 130, 246, 0.3); background: rgba(255,255,255,0.04); }
        
        .topic-header { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.1rem; color: #f1f5f9; font-family: 'Outfit', sans-serif; }
        
        .action-matrix { display: flex; flex-direction: column; gap: 1rem; }
        .action-row { display: flex; flex-direction: column; gap: 0.4rem; }
        .action-label { font-size: 0.65rem; color: var(--text-gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

        .btn-small {
            padding: 0.5rem;
            font-size: 0.75rem;
            text-align: center;
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
        }
        .btn-small:hover { background: var(--accent); border-color: var(--accent); color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }

        .master-topic {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(16, 185, 129, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        /* RIGHT PANEL: SLIDES EXPLORER */
        .slide-panel { flex: 1; padding: 2rem; overflow-y: auto; background: var(--bg-dark); }
        .slide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
        
        .slide-thumb {
            aspect-ratio: 16/10;
            background: #1e293b;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            justify-content: center;
            position: relative;
        }
        .slide-thumb:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 10px 25px -10px rgba(59, 130, 246, 0.3); background: #26334d; }
        .slide-thumb .name { font-size: 0.85rem; font-weight: 700; color: #f1f5f9; line-height: 1.3; }
        
        /* MODAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #modal-container { width: 95%; height: 92%; background: #fff; border-radius: 16px; position: relative; overflow: hidden !important; display: flex; flex-direction: column; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.1); }
        #modal-content { flex: 1; position: relative; padding: 0; overflow: hidden !important; display: flex; align-items: center; justify-content: center; }
        .modal-slide-view { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .modal-slide-view .slide {
            opacity: 1 !important; transform: none !important; position: relative !important; top: 0 !important; left: 0 !important;
            height: 100% !important; width: 100% !important; padding: 3rem 4rem !important; background: #fff !important;
            display: flex !important; flex-direction: column !important; justify-content: center !important; overflow: hidden !important;
            color: #1e293b !important;
        }
        .modal-slide-view .slide h1, .modal-slide-view .slide h2, .modal-slide-view .slide p, .modal-slide-view .slide .star-text { color: #1e293b !important; }
        .modal-slide-view .content-wrapper { margin: 0 auto !important; width: 100% !important; max-width: 90% !important; padding: 0 !important; }
    </style>
</head>
<body>
    <header>
        <h1>Engineering Productivity Console</h1>
        <div style="font-size: 0.8rem; color: var(--text-gray);">v2.0 • Matrix Navigation Hub</div>
    </header>

    <div class="main-container">
        <!-- LEFT: RESUME HUB -->
        <div class="resume-panel">
            <div class="resume-section">
                <span class="section-title">Master Portfolio</span>
                <div class="resume-topic master-topic">
                    <div class="topic-header">Full Career Master</div>
                    <div class="btn-group">
                        <a href="output/resume_master.pdf" target="_blank" class="btn-small">One-page</a>
                        <a href="output/resume_slides.pdf" target="_blank" class="btn-small">Slides</a>
                    </div>
                </div>
            </div>

            <div class="resume-section">
                <span class="section-title">Technical Specializations</span>
                
                <!-- Embedded -->
                <div class="resume-topic" style="margin-bottom: 0.8rem;">
                    <div class="topic-header">Embedded Systems</div>
                    <div class="btn-group">
                        <a href="output/resume_embedded.pdf" target="_blank" class="btn-small">One-page</a>
                        <a href="output/resume_slides_embedded.pdf" target="_blank" class="btn-small">Slides</a>
                    </div>
                </div>

                <!-- Fullstack -->
                <div class="resume-topic" style="margin-bottom: 0.8rem;">
                    <div class="topic-header">Full-Stack / Cloud</div>
                    <div class="btn-group">
                        <a href="output/resume_fullstack.pdf" target="_blank" class="btn-small">One-page</a>
                        <a href="output/resume_slides_fullstack.pdf" target="_blank" class="btn-small">Slides</a>
                    </div>
                </div>

                <!-- Target Tailored -->
                <div class="resume-topic">
                    <div class="topic-header">Google Performance</div>
                    <div class="btn-group">
                        <a href="output/resume_tailored.pdf" target="_blank" class="btn-small">One-page</a>
                        <a href="output/resume_slides_tailored.pdf" target="_blank" class="btn-small">Slides</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: SLIDES EXPLORER -->
        <div class="slide-panel">
            <span class="section-title">Case Study Slides Explorer</span>
            <div class="slide-grid" id="slide-grid">
                <!-- Slides will be injected here via scripts -->
            </div>
        </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay">
        <div id="modal-container">
            <div id="modal-content" class="slides-container">
                <!-- Fetched slide content goes here -->
            </div>
        </div>
    </div>

    <script>
        const slides = [
            { id: 'tailored_openclaw_log', name: 'Log Matrix (Semantic)', tag: 'AI / Diagnostic' },
            { id: 'tailored_nvssvt_portal', name: 'Orchestration Portal', tag: 'Platform / SDK' },
            { id: 'tailored_jetson_bsp', name: 'Jetson Orin BSP', tag: 'Embedded / Performance' },
            { id: 'tailored_redfish_smbios_check', name: 'Redfish Validation', tag: 'Firmware / BMC' },
            { id: 'tailored_central_dashboard', name: 'Engineering Dashboard', tag: 'Infrastructure / DevOps' },
            { id: 'openclaw_mr', name: 'OpenClaw: MR Review', tag: 'AI / Automation' },
            { id: 'openclaw_log', name: 'OpenClaw: Log Diagnosis', tag: 'AI / Diagnostic' },
            { id: 'jetson_bsp', name: 'Jetson Orin: Boot Flow', tag: 'Embedded / BSP' },
            { id: 'ansible', name: 'Infrastructure as Code', tag: 'DevOps / IaC' },
            { id: 'central_dashboard', name: 'Unified Portal', tag: 'Platform / Full-Stack' },
            { id: 'bios_preserve_test', name: 'Firmware OCR Engine', tag: 'Image Process / FW' },
            { id: 'redfish_smbios_check', name: 'Consistency Framework', tag: 'Firmware / BMC' },
            { id: 'nvssvt_portal', name: 'Automation Engine', tag: 'Orchestration' },
            { id: 'issue_analytics', name: 'Issue Trend Analytics', tag: 'Data / Python' },
            { id: 'gitlab_ci', name: 'CI Pipeline Optimization', tag: 'DevOps / CI' },
            { id: 'gitlab_cd', name: 'CD Release Engineering', tag: 'DevOps / CD' },
            { id: 'baby_tracker', name: 'Distributed Sync App', tag: 'Full-Stack / Local-First' },
            { id: 'pic_transcript', name: 'Document Analysis', tag: 'Data / OCR' }
        ];

        const grid = document.getElementById('slide-grid');
        const modal = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');

        // Render Slide Grid
        slides.forEach(slide => {
            const div = document.createElement('div');
            div.className = 'slide-thumb';
            
            div.innerHTML = `
                <div class="name">${slide.name}</div>
                <div class="tag-label" style="font-size: 0.6rem; color: var(--accent); font-weight: 700; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em;">${slide.tag}</div>
                <div style="font-size: 0.5rem; color: #475569; margin-top: 4px; opacity: 0.7;">${slide.id}.html</div>
            `;
            
            div.onclick = () => openSlide(slide.id);
            grid.appendChild(div);
        });

        async function openSlide(slideId) {
            modalContent.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100%; color: #334155;">Loading Professional Slide...</div>';
            modal.style.display = 'flex';
            
            try {
                const response = await fetch(`src/slides/${slideId}.html`);
                const html = await response.text();
                
                // Wrap in required classes for styles.css to work correctly
                modalContent.innerHTML = `<div class="modal-slide-view">${html}</div>`;
            } catch (err) {
                modalContent.innerHTML = `<div style="color: red; padding: 2rem;">Error loading slide: ${err.message}</div>`;
            }
        }

        const closeModal = () => {
            modal.style.display = 'none';
        };

        // Close on background click
        window.onclick = (event) => {
            if (event.target == modal) closeModal();
        };

        // Close on ESC key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') {
                closeModal();
            }
        });
    </script>
</body>
</html>
