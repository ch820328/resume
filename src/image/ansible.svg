<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="ansibleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">Test-Driven IaC</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Ansible Provisioning Workflow</text>

  <!-- =============================== -->
  <!-- TOP/MIDDLE: Terminal Window     -->
  <!-- =============================== -->
  <g transform="translate(20, 55)" filter="url(#shadow)">
    <!-- Terminal Body -->
    <rect x="0" y="0" width="360" height="250" rx="10" fill="url(#lightGrad)" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Terminal Header Bar -->
    <rect x="0" y="0" width="360" height="25" rx="10" fill="url(#headerGrad)"/>
    <rect x="0" y="15" width="360" height="10" fill="url(#headerGrad)"/> <!-- Square bottom corners -->
    
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="12.5" r="5" fill="#ff5f56"/>
    <circle cx="30" cy="12.5" r="5" fill="#ffbd2e"/>
    <circle cx="45" cy="12.5" r="5" fill="#27c93f"/>
    
    <text x="180" y="17" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="10" fill="#475569">dev@local: ~/ansible-roles</text>

    <!-- Terminal Content Area -->
    <!-- Molecule Create -->
    <g transform="translate(15, 50)">
      <text x="0" y="0" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#0369a1">$ molecule create</text>
      <text x="15" y="16" font-family="'Roboto Mono', monospace" font-size="10" fill="#64748b">&gt; [Docker] Spin up ephemeral containers...</text>
    </g>

    <!-- Molecule Converge -->
    <g transform="translate(15, 95)">
      <text x="0" y="0" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#0369a1">$ molecule converge</text>
      <text x="15" y="16" font-family="'Roboto Mono', monospace" font-size="10" fill="#64748b">&gt; [Ansible] Running idempotent roles...</text>
      <text x="15" y="32" font-family="'Roboto Mono', monospace" font-size="10" fill="#15803d">&gt; PLAY RECAP: changed=0, failed=0</text>
    </g>

    <!-- Molecule Verify -->
    <g transform="translate(15, 155)">
      <text x="0" y="0" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#0369a1">$ molecule verify</text>
      <text x="15" y="16" font-family="'Roboto Mono', monospace" font-size="10" fill="#64748b">&gt; [Testinfra] Validating packages &amp; ports...</text>
      <text x="15" y="32" font-family="'Roboto Mono', monospace" font-size="10" fill="#15803d">&gt; 18 passed in 2.1s</text>
    </g>

    <!-- Ansible Playbook (Prod) -->
    <g transform="translate(15, 215)">
      <text x="0" y="0" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#9a3412">$ ansible-playbook -i hosts.ini main.yml</text>
      <text x="15" y="16" font-family="'Roboto Mono', monospace" font-size="10" fill="#1e293b">&gt; Deploying validated roles to Fleet...</text>
    </g>
  </g>

  <!-- Flow Arrows (Fan out) -->
  <path d="M110 305 L75 345" stroke="#64748b" stroke-width="2" marker-end="url(#arrowIac)" fill="none" stroke-dasharray="4,2"/>
  <path d="M200 305 L200 345" stroke="#64748b" stroke-width="2" marker-end="url(#arrowIac)" fill="none" stroke-dasharray="4,2"/>
  <path d="M290 305 L325 345" stroke="#64748b" stroke-width="2" marker-end="url(#arrowIac)" fill="none" stroke-dasharray="4,2"/>

  <!-- =============================== -->
  <!-- BOTTOM: Target Environments     -->
  <!-- =============================== -->
  <!-- Moved from y=360 to y=350 to fit closely -->
  <g transform="translate(10, 350)">
    <!-- Node 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="115" height="45" rx="6" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
      <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#166534">Ubuntu Host</text>
      <text x="57.5" y="35" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#15803d">100% Parity</text>
    </g>

    <!-- Node 2 -->
    <g transform="translate(132.5, 0)">
      <rect x="0" y="0" width="115" height="45" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
      <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1e40af">CentOS VM 1</text>
      <text x="57.5" y="35" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#1d4ed8">100% Parity</text>
    </g>

    <!-- Node 3 -->
    <g transform="translate(265, 0)">
      <rect x="0" y="0" width="115" height="45" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
      <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1e40af">CentOS VM 2</text>
      <text x="57.5" y="35" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#1d4ed8">100% Parity</text>
    </g>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 435)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#16a34a">⚡ -97% Provisioning Time</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#2563eb">🛡️ Eliminated Env Drift</text>
      </g>
  </g>

  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">IaC: Infrastructure as Code | SUT: System Under Test</text>
</svg>
