<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowRecovery" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>

    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="50%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">NVRAM Persistence Validation</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Self-Healing BIOS Test Automation</text>

  <!-- =============================== -->
  <!-- TOP: Step 1 (Set Config)        -->
  <!-- =============================== -->
  <g transform="translate(60, 55)" filter="url(#shadow)">
    <!-- Container -->
    <rect x="0" y="0" width="280" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="25" rx="6" fill="#f8fafc"/>
    <rect x="0" y="15" width="280" height="10" fill="#f8fafc"/>
    <text x="140" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">1. Pre-Flash Configuration</text>

    <!-- Content -->
    <g transform="translate(15, 35)">
        <rect x="0" y="0" width="250" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
        <text x="125" y="16" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1d4ed8">UEFI Shell (EDK II/C)</text>
        <text x="125" y="30" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="500" font-size="9" fill="#2563eb">Set Boot Order &amp; Setup Variables</text>
    </g>
  </g>

  <!-- Flow 1 -->
  <path d="M200 145 L200 170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowFlow)"/>

  <!-- =============================== -->
  <!-- MIDDLE: Step 2 (Flash BIOS)     -->
  <!-- =============================== -->
  <g transform="translate(60, 170)" filter="url(#shadow)">
    <!-- Container -->
    <rect x="0" y="0" width="280" height="135" rx="8" fill="url(#lightGrad)" stroke="#1e3a8a" stroke-width="2"/>
    
    <!-- Content -->
    <text x="140" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#0f172a">2. In-Band BIOS Flash</text>

    <g transform="translate(20, 40)">
        <rect x="0" y="0" width="240" height="35" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1"/>
        <text x="120" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#334155">Trigger Firmware Update Payload</text>
    </g>

    <!-- Split path indicator -->
    <g transform="translate(20, 90)">
        <!-- Success path -->
        <rect x="0" y="0" width="115" height="30" rx="4" fill="#064e3b" stroke="#059669" stroke-width="1"/>
        <text x="57.5" y="19" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#34d399">Success</text>

        <!-- Failure path -->
        <rect x="125" y="0" width="115" height="30" rx="4" fill="#7f1d1d" stroke="#dc2626" stroke-width="1"/>
        <text x="182.5" y="19" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#fca5a5">Flash Failure</text>
    </g>
  </g>

  <!-- Flow 2 (Success Downward) -->
  <path d="M140 305 L140 350" stroke="#10b981" stroke-width="2" marker-end="url(#arrowFlow)"/>

  <!-- Flow 3 (Failure OOB Recovery hook) -->
  <!-- Arc to the right, down, and back to step 2 -->
  <path d="M260 305 L260 330 A 10 10 0 0 0 270 340 L350 340 A 10 10 0 0 0 360 330 L360 210 A 10 10 0 0 0 350 200 L340 200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRecovery)" stroke-dasharray="4,4" fill="none"/>
  
  <rect x="290" y="250" width="90" height="35" rx="4" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="335" y="265" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#e11d48">OOB BMC</text>
  <text x="335" y="278" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#be123c">Self-Heal Redfish</text>

  <!-- =============================== -->
  <!-- BOTTOM: Step 3 (Validation)     -->
  <!-- =============================== -->
  <g transform="translate(60, 350)" filter="url(#shadow)">
    <!-- Container -->
    <rect x="0" y="0" width="280" height="90" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="25" rx="6" fill="url(#successGrad)"/>
    <rect x="0" y="15" width="280" height="10" fill="url(#successGrad)"/>
    <!-- Mac OS Window Buttons -->
    <circle cx="12" cy="12.5" r="3.5" fill="#ff5f56"/>
    <circle cx="22" cy="12.5" r="3.5" fill="#ffbd2e"/>
    <circle cx="32" cy="12.5" r="3.5" fill="#27c93f"/>
    <text x="140" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#065f46">3. Post-Flash Validation</text>

    <!-- Content -->
    <g transform="translate(15, 35)">
        <rect x="0" y="0" width="250" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
        <text x="125" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="11" fill="#16a34a">BIOS Restores User Settings</text>
        <text x="125" y="32" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="500" font-size="9" fill="#15803d">Assert NVRAM == PRE_FLASH_CONFIG</text>
    </g>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 465)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#16a34a">✅ 80% Automated Tests</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#2563eb">🛡️ 100% In-Band Covered</text>
      </g>
  </g>

  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">UEFI: Unified Extensible Firmware Interface | OOB: Out-Of-Band</text>
</svg>
