<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="portalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrowAction" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowDataRev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#64748b"/>
    </marker>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>

    <linearGradient id="buttonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">Unified Engineering Portal</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">RD &amp; QA Fast Debugging UI</text>

  <!-- =============================== -->
  <!-- TOP: User Groups (RD & QA)      -->
  <!-- =============================== -->
  <g transform="translate(100, 55)">
    <rect x="0" y="0" width="200" height="30" rx="15" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="100" y="19" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#475569">👨‍💻 RD / 🕵️ QA Engineers</text>
  </g>

  <!-- Flow Arrows (Inbound) -->
  <path d="M200 85 L200 110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAction)"/>

  <!-- =============================== -->
  <!-- MIDDLE: Angular + Go Portal     -->
  <!-- =============================== -->
  <g transform="translate(30, 110)" filter="url(#shadow)">
    <!-- Browser Window Container -->
    <rect x="0" y="0" width="340" height="240" rx="10" fill="url(#lightGrad)" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Browser Header Tab -->
    <rect x="0" y="0" width="340" height="30" rx="8" fill="#f1f5f9"/>
    <!-- Square bottom corners -->
    <rect x="0" y="20" width="340" height="10" fill="#f1f5f9"/>
    
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="15" r="5" fill="#ef4444"/>
    <circle cx="30" cy="15" r="5" fill="#f59e0b"/>
    <circle cx="45" cy="15" r="5" fill="#10b981"/>
    
    <!-- Tab Text -->
    <rect x="90" y="5" width="160" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="170" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1d4ed8">Angular + Go Web UI</text>

    <!-- FEATURE GRID -->
    <!-- Feature 1: GUI Wrappers (IPMI/Redfish) -->
    <g transform="translate(15, 45)">
        <rect x="0" y="0" width="150" height="55" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
        <text x="75" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#166534">GUI Hardware Tools</text>
        <!-- Wrappers -->
        <rect x="10" y="25" width="60" height="20" rx="4" fill="#dcfce7"/>
        <text x="40" y="39" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="8" fill="#15803d">ipmitool</text>
        
        <rect x="80" y="25" width="60" height="20" rx="4" fill="#dcfce7"/>
        <text x="110" y="39" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="8" fill="#15803d">redfish</text>
    </g>

    <!-- Feature 2: One-Click Testing -->
    <g transform="translate(175, 45)">
        <rect x="0" y="0" width="150" height="55" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
        <text x="75" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#1d4ed8">One-Click Execution</text>
        
        <!-- Action Buttons -->
        <rect x="10" y="25" width="130" height="20" rx="4" fill="url(#buttonGrad)"/>
        <text x="75" y="39" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#ffffff">▶ Run Validation Suite</text>
    </g>

    <!-- Feature 3: WebSSH & Logs -->
    <g transform="translate(15, 110)">
        <rect x="0" y="0" width="310" height="60" rx="6" fill="#f8fafc" stroke="#1e293b" stroke-width="1"/>
        <!-- Terminal Header -->
    <rect x="0" y="0" width="310" height="20" rx="6" fill="url(#headerGrad)"/>
    <rect x="0" y="10" width="310" height="10" fill="url(#headerGrad)"/>
        <text x="155" y="14" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#475569">WebSSH &amp; Docker Logs</text>
        
        <!-- Terminal Content -->
        <text x="10" y="35" font-family="'Roboto Mono', monospace" font-weight="700" font-size="10" fill="#15803d">$ ssh rd@vm-target</text>
        <text x="10" y="50" font-family="'Roboto Mono', monospace" font-size="9" fill="#64748b">&gt; tail -f /var/log/docker-containers.log...</text>
    </g>

    <!-- Unified Go Middleware -->
    <g transform="translate(15, 180)">
       <rect x="0" y="0" width="310" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
       <text x="155" y="16" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1e40af">Go Backend Orchestrator</text>
       <text x="155" y="30" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#2563eb">Translates Clicks &amp; WebSockets to Shell/APIs</text>
    </g>

  </g>

  <!-- Flow 2 (Bidirectional down to Hardware Fleet) -->
  <path d="M200 350 L200 380" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowAction)" marker-start="url(#arrowDataRev)" fill="none"/>

  <!-- =============================== -->
  <!-- BOTTOM: SUT (System Under Test) -->
  <!-- =============================== -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="280" height="55" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
    <text x="140" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#0f172a">Global SUT Hardware / VMs</text>
    <text x="140" y="40" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="10" fill="#475569">Execute commands &amp; stream responses</text>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 465)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#16a34a">⚡ Drastic Time Reduction</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#2563eb">📉 Lowest Learning Curve</text>
      </g>
  </g>

  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">SUT: System Under Test</text>
</svg>
