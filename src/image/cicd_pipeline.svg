<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="gitLabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrowCI" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">GitLab CI Pipeline</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Automated Quality Gate</text>

  <!-- =============================== -->
  <!-- TOP: Developer Commit           -->
  <!-- =============================== -->
  <g transform="translate(130, 55)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="70" y="19" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#334155">git push</text>
    <text x="70" y="33" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#64748b">Merge Request</text>
  </g>

  <!-- Flow 1 -->
  <path d="M200 95 L200 120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowCI)"/>

  <!-- =============================== -->
  <!-- MIDDLE: CI Quality Gates        -->
  <!-- =============================== -->
  <g transform="translate(60, 120)" filter="url(#shadow)">
    <!-- Container -->
    <!-- Container -->
    <rect x="0" y="0" width="280" height="230" rx="12" fill="url(#lightGrad)" stroke="#1e293b" stroke-width="2"/> <!-- Dark Slate border -->
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="30" rx="10" fill="url(#headerGrad)"/>
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
    <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
    <circle cx="39" cy="15" r="4" fill="#27c93f"/>
    <text x="140" y="19" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#1e293b">🦊 Pipeline Execution (Dockerized)</text>

    <!-- Stage 1: Commit Lint -->
    <g transform="translate(20, 50)">
        <rect x="0" y="0" width="240" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">1. Conventional Commits</text>
        <rect x="180" y="8" width="50" height="18" rx="4" fill="#dcfce7"/>
        <text x="205" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#16a34a">PASS</text>
    </g>

    <!-- Down Arrow Inside -->
    <path d="M140 85 L140 100" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowCI)"/>

    <!-- Stage 2: Static Analysis -->
    <g transform="translate(20, 100)">
        <rect x="0" y="0" width="240" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">2. Code Linting &amp; Formatting</text>
        <rect x="180" y="8" width="50" height="18" rx="4" fill="#dcfce7"/>
        <text x="205" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#16a34a">PASS</text>
    </g>

    <!-- Down Arrow Inside -->
    <path d="M140 135 L140 150" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowCI)"/>

    <!-- Stage 3: Python Tooling -->
    <g transform="translate(20, 150)">
        <rect x="0" y="0" width="240" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">3. Custom Python Validators</text>
        <rect x="180" y="8" width="50" height="18" rx="4" fill="#dcfce7"/>
        <text x="205" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#16a34a">PASS</text>
    </g>

    <text x="140" y="215" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="10" fill="#64748b">Prevents non-compliant code from merging</text>
  </g>

  <!-- Flow 2 -->
  <path d="M200 350 L200 380" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowCI)" fill="none"/>

  <!-- =============================== -->
  <!-- BOTTOM: Clean Git History       -->
  <!-- =============================== -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="280" height="60" rx="8" fill="#f8fafc" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#065f46">Clean &amp; Searchable Git History</text>
    <text x="140" y="45" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="10" fill="#059669">feat: update CI runner config</text>
    <text x="140" y="55" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#64748b">Automated Release Notes Enabled</text>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 465)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#16a34a">✅ 100% Automated Checks</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="80" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#2563eb">⏱️ -30% Review Cycles</text>
      </g>
  </g>

  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">CI: Continuous Integration | Lint: Static Code Analysis</text>
</svg>
