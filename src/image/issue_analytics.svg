<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="biGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrowData" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>

    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="50%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">Issue Analytics</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Cross-Platform Data Intelligence Engine</text>

  <!-- =============================== -->
  <!-- TOP: Data Sources (Silos)       -->
  <!-- =============================== -->
  <g transform="translate(40, 55)">
    <!-- Source 1: Redmine -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#dc2626">Redmine</text>
    </g>

    <!-- Source 2: GitLab -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#ea580c">GitLab Ticket</text>
    </g>

    <!-- Source 3: Project Boards -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="10" fill="#2563eb">Project Boards</text>
    </g>
  </g>

  <!-- Flow Arrows 1 -->
  <path d="M 85 95 L 200 135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowData)" stroke-dasharray="3,3" fill="none"/>
  <path d="M 200 95 L 200 135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowData)" stroke-dasharray="3,3" fill="none"/>
  <path d="M 315 95 L 200 135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowData)" stroke-dasharray="3,3" fill="none"/>

  <!-- =============================== -->
  <!-- MIDDLE: ETL & BI Platform       -->
  <!-- =============================== -->
  <g transform="translate(50, 140)" filter="url(#shadow)">
    <!-- Platform Container -->
    <!-- Platform Container -->
    <rect x="0" y="0" width="300" height="180" rx="10" fill="url(#lightGrad)" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="300" height="35" rx="10" fill="url(#headerGrad)"/>
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="17.5" r="4" fill="#ff5f56"/>
    <circle cx="27" cy="17.5" r="4" fill="#ffbd2e"/>
    <circle cx="39" cy="17.5" r="4" fill="#27c93f"/>
    <text x="150" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#1e293b">Laravel BI Platform</text>

    <!-- ETL Pipeline -->
    <rect x="40" y="55" width="220" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="150" y="74" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="600" font-size="11" fill="#475569">ETL Data Aggregation</text>
    
    <!-- Down Arrow Inside -->
    <path d="M150 85 L150 105" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowData)"/>

    <!-- SQL Analytics -->
    <rect x="40" y="105" width="220" height="30" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="150" y="125" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">Complex SQL Analytics</text>

    <!-- Metrics Computed -->
    <text x="150" y="155" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="10" fill="#ef4444">⚠️ "Unhealthy Rates" (>7 days)</text>
  </g>

  <!-- Flow Arrows 2 -->
  <path d="M200 320 L200 355" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowData)" fill="none"/>

  <!-- =============================== -->
  <!-- BOTTOM: Dashboard / KPIs        -->
  <!-- =============================== -->
  <g transform="translate(50, 360)">
    <!-- Dashboard Container -->
    <rect x="0" y="0" width="300" height="90" rx="8" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#475569">Actionable Leadership Dashboard</text>
    
    <!-- Mini Charts -->
    <!-- Chart 1: Bar -->
    <g transform="translate(20, 35)">
        <rect x="0" y="25" width="15" height="15" fill="#3b82f6"/>
        <rect x="20" y="10" width="15" height="30" fill="#f59e0b"/>
        <rect x="40" y="15" width="15" height="25" fill="#10b981"/>
        <rect x="60" y="0" width="15" height="40" fill="#ef4444"/>
        <line x1="0" y1="40" x2="80" y2="40" stroke="#475569" stroke-width="2"/>
    </g>

    <!-- Chart 2: KPIs -->
    <g transform="translate(140, 35)">
        <rect x="0" y="0" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
        <text x="65" y="16" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="10" fill="#475569">Stalled Tickets Identified</text>
        <text x="65" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#059669">+20% Visibility</text>
    </g>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(50, 465)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="140" height="30" rx="15" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
        <text x="70" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#16a34a">📉 Reduced MTTR</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="140" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="70" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#2563eb">🎯 Resource Efficiency</text>
      </g>
  </g>

  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">ETL: Extract, Transform, Load | MTTR: Mean Time To Recovery</text>
</svg>
