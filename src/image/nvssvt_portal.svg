<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>

    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">NVSSVT Automation Platform</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Cross-Lab Unified Automation Orchestrator</text>

  <!-- =============================== -->
  <!-- TOP TIER: Upstream Inputs       -->
  <!-- =============================== -->
  <g transform="translate(60, 55)">
    <!-- User/Browser -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="130" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="65" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#334155">👨‍💻 Engineers</text>
      <text x="65" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#64748b">(Web UI manually)</text>
    </g>

    <!-- CI/CD Pipeline -->
    <g transform="translate(150, 0)"> 
      <rect x="0" y="0" width="130" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="65" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#334155">🦊 CI Pipelines</text>
      <text x="65" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#64748b">(API Trigger)</text>
    </g>
  </g>

  <path d="M125 95 L125 125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>
  <path d="M275 95 L275 125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>

  <!-- =============================== -->
  <!-- MIDDLE TIER: Orchestrator       -->
  <!-- =============================== -->
  <g transform="translate(40, 125)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="150" rx="10" fill="url(#lightGrad)" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="30" rx="10" fill="url(#headerGrad)"/>
    <rect x="0" y="20" width="320" height="10" fill="url(#headerGrad)"/>
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
    <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
    <circle cx="39" cy="15" r="4" fill="#27c93f"/>
    <text x="160" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#1e3a8a">NVSSVT Orchestrator Node</text>
    
    <!-- API Gateway -->
    <rect x="30" y="40" width="260" height="25" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="160" y="57" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#1e40af">OpenAPI Gateway / Auth</text>

    <!-- Logic Core -->
    <rect x="30" y="75" width="260" height="25" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="92" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#334155">Go Redis Queue &amp; Scheduler</text>

    <!-- Container Engine -->
    <rect x="30" y="110" width="260" height="25" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="127" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#334155">Central Log Aggregator</text>
  </g>

  <!-- Flow 2 (Fan out) -->
  <path d="M200 275 L200 300 L85 300 L85 330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>
  <path d="M200 275 L200 330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>
  <path d="M200 275 L200 300 L315 300 L315 330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>


  <!-- =============================== -->
  <!-- BOTTOM TIER: Distributed Agents -->
  <!-- =============================== -->
  <g transform="translate(40, 330)">
    <!-- Agent 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="10" fill="#334155">Lab A Client</text>
    </g>

    <!-- Agent 2 -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="10" fill="#334155">Lab B Client</text>
    </g>

    <!-- Agent 3 -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="90" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="10" fill="#334155">Lab C Client</text>
    </g>
    
    <text x="160" y="65" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Automated parallel tests on local hardware</text>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 465)">
      <!-- Central Badge -->
      <g transform="translate(40, 0)">
        <rect x="0" y="0" width="260" height="35" rx="17.5" fill="url(#successGrad)" stroke="#10b981" stroke-width="2"/>
        <text x="130" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#166534">⚡ MANUAL EFFORT REDUCED BY 80%</text>
      </g>
  </g>
  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">NVSSVT: NVIDIA System Software Validation Tool</text>
</svg>
