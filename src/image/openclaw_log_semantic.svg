<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <linearGradient id="semanticGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>

    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">OpenClaw: Log Matrix &amp; Automated Diagnosis</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Automated Log Contextualization &amp; Diagnosis</text>

  <!-- TOP TIER: Sources -->
  <g transform="translate(45, 55)">
    <!-- Source 1: FAIL Log -->
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="70" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">📁 Raw FAIL Log</text>
    <text x="70" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="8" fill="#64748b">(rf_debug / BiosLib)</text>

    <!-- Source 2: Codebase Index -->
    <g transform="translate(170, 0)">
      <rect x="0" y="0" width="140" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
      <text x="70" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#1e40af">📚 Codebase Index</text>
      <text x="70" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="8" fill="#2563eb">(Vector store)</text>
    </g>
  </g>

  <path d="M115 95 L115 120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>
  <path d="M285 95 L285 120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>

  <!-- MIDDLE TIER: Diagnostic Engine -->
  <g transform="translate(30, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="280" rx="10" fill="url(#lightGrad)" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="0" y="0" width="340" height="30" rx="10" fill="url(#headerGrad)"/>
    <rect x="0" y="20" width="340" height="10" fill="url(#headerGrad)"/>
    <text x="170" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#1e3a8a">Log Diagnostic Pipeline</text>
    
    <!-- SEMANTIC RETRIEVAL -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="280" height="50" rx="6" fill="url(#semanticGrad)" stroke="#3b82f6" stroke-width="1"/>
      <text x="140" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#1e40af">Semantic Engine: Contextual Search</text>
      <text x="140" y="34" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="9" fill="#1e3a8a">Query(FAIL Log) → Fetch(Source Code)</text>
    </g>

    <!-- MATRIX MATRIX BOX -->
    <rect x="20" y="110" width="300" height="155" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Combined Context -->
    <g transform="translate(45, 120)">
      <rect x="0" y="0" width="210" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="105" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#475569">Synergized Context (Log + Code)</text>
    </g>

    <!-- Experts -->
    <g transform="translate(25, 155)">
        <text x="145" y="10" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#1e3a8a">Matrix Log Diagnostic</text>
        <!-- Root Cause -->
        <g transform="translate(0, 20)">
          <rect x="0" y="0" width="90" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
          <text x="45" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#1e40af">🔍 Root Cause</text>
        </g>
        <!-- Action Item -->
        <g transform="translate(100, 20)">
          <rect x="0" y="0" width="90" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
          <text x="45" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#1e40af">🛠️ Actions</text>
        </g>
        <!-- Severity -->
        <g transform="translate(200, 20)">
          <rect x="0" y="0" width="90" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
          <text x="45" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#1e40af">📉 Severity</text>
        </g>
    </g>

    <path d="M170 220 L170 235" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowFlow)"/>

    <!-- Final Strategy -->
    <g transform="translate(45, 235)">
        <rect x="0" y="0" width="250" height="25" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
        <text x="125" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="10" fill="#166534">Consolidated Diagnostic Report</text>
    </g>
  </g>

  <!-- Flow Output -->
  <path d="M200 400 L200 435" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="4,4" fill="none"/>

  <!-- BOTTOM TIER: Results -->
  <g transform="translate(40, 435)">
    <rect x="0" y="0" width="320" height="40" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="160" y="24" text-anchor="middle" font-family="'Roboto Mono', monospace" font-weight="700" font-size="11" fill="#334155">Issue Records / Similarity Search</text>
  </g>

  <!-- FOOTER -->
  <g transform="translate(50, 485)">
      <rect x="0" y="0" width="300" height="25" rx="12.5" fill="url(#successGrad)" stroke="#10b981" stroke-width="1"/>
      <text x="150" y="17" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="10" fill="#166534">⚡ FROM RAW LOG TO ACTIONABLE INSIGHTS</text>
  </g>
</svg>
