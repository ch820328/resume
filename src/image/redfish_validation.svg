<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>

    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="50%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>

    <!-- Markers -->
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Title / Global -->
  <text x="200" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#1e293b">Cross-Interface Validation</text>
  <text x="200" y="38" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#64748b">Python Strategy Pattern Architecture</text>

  <!-- =============================== -->
  <!-- TOP: The Strategies (Data Src)  -->
  <!-- =============================== -->
  <g transform="translate(15, 60)">
    
    <!-- Strategy 1: Redfish API -->
    <g transform="translate(0, 0)">
        <rect x="0" y="0" width="115" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">Redfish API</text>
        <rect x="10" y="28" width="95" height="15" rx="3" fill="#f1f5f9"/>
        <text x="57.5" y="39" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="8" fill="#475569">GET /Systems/1</text>
    </g>

    <!-- Strategy 2: Selenium UI -->
    <g transform="translate(125, 0)">
        <rect x="0" y="0" width="115" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">Selenium UI</text>
        <rect x="10" y="28" width="95" height="15" rx="3" fill="#f1f5f9"/>
        <text x="57.5" y="39" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="8" fill="#475569">find_element()</text>
    </g>

    <!-- Strategy 3: SMBIOS -->
    <g transform="translate(250, 0)">
        <rect x="0" y="0" width="115" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <text x="57.5" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#334155">SMBIOS / CLI</text>
        <rect x="10" y="28" width="95" height="15" rx="3" fill="#f1f5f9"/>
        <text x="57.5" y="39" text-anchor="middle" font-family="'Roboto Mono', monospace" font-size="8" fill="#475569">smbiosview -t</text>
    </g>
  </g>

  <!-- Flow Arrows Down to Engine -->
  <path d="M72 110 L200 135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="3,3" fill="none"/>
  <path d="M200 110 L200 135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="3,3" fill="none"/>
  <path d="M328 110 L200 135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="3,3" fill="none"/>

  <!-- =============================== -->
  <!-- MIDDLE: Reconciliation Engine   -->
  <!-- =============================== -->
  <g transform="translate(40, 140)" filter="url(#shadow)">
    <!-- Container -->
    <rect x="0" y="0" width="320" height="150" rx="10" fill="url(#lightGrad)" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="30" rx="10" fill="url(#headerGrad)"/>
    <rect x="0" y="20" width="320" height="10" fill="url(#headerGrad)"/>
    <!-- Mac OS Window Buttons -->
    <circle cx="15" cy="15" r="4" fill="#ff5f56"/>
    <circle cx="27" cy="15" r="4" fill="#ffbd2e"/>
    <circle cx="39" cy="15" r="4" fill="#27c93f"/>
    <text x="160" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#1e3a8a">Data Reconciliation Framework</text>
    
    <!-- Step 1: Normalization -->
    <rect x="30" y="45" width="260" height="35" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="160" y="67" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#1e40af">Data Normalization Layer</text>

    <!-- Flow Arrow Inside -->
    <path d="M160 80 L160 100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowFlow)" fill="none"/>

    <!-- Step 2: Consistency Checks -->
    <rect x="30" y="100" width="260" height="35" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="122" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#334155">Multi-Layered Consistency Audit</text>
  </g>

  <!-- Flow Arrows Down to Result -->
  <path d="M200 290 L200 325" stroke="#64748b" stroke-width="2" marker-end="url(#arrowFlow)" stroke-dasharray="3,3" fill="none"/>

  <!-- =============================== -->
  <!-- BOTTOM: Validation Results      -->
  <!-- =============================== -->
  <g transform="translate(60, 325)">
    <rect x="0" y="0" width="280" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="140" y="25" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#334155">Unified Quality Gate Result</text>
    
    <!-- Pass/Fail Boxes -->
    <g transform="translate(20, 45)">
        <rect x="0" y="0" width="115" height="35" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
        <text x="57.5" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#166534">✅ Pass</text>
    </g>

    <g transform="translate(145, 45)">
        <rect x="0" y="0" width="115" height="35" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
        <text x="57.5" y="22" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#dc2626">❌ Bug Found</text>
    </g>
  </g>

  <!-- =============================== -->
  <!-- FOOTER: Impact Badges           -->
  <!-- =============================== -->
  <g transform="translate(30, 465)">
      <!-- Left Badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="160" height="35" rx="17.5" fill="url(#successGrad)" stroke="#86efac" stroke-width="2"/>
        <text x="80" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="13" fill="#166534">⏱️ 90% Faster</text>
        <text x="80" y="28" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#15803d">End-to-End Verification Time</text>
      </g>
      
      <!-- Right Badge -->
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="160" height="35" rx="17.5" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
        <text x="80" y="18" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" font-size="13" fill="#1d4ed8">🔍 Standardized Audit</text>
        <text x="80" y="28" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#2563eb">Field Bug Prevention</text>
      </g>
  </g>
  <!-- Terminology Legend -->
  <text x="200" y="510" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">Redfish: RESTful Systems Management API | SMBIOS: System Management BIOS</text>
</svg>
