<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Page Resume</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --text-color: #333;
            --date-column-width: 120px;
        }

        body {
            font-family: 'Inter', 'Calibri', 'Arial', sans-serif;
            color: var(--text-color);
            line-height: 1.4;
            margin: 0;
            padding: 0;
            font-size: 10.5pt;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            margin: 0 auto;
            background: white;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .header-left h1 {
            font-size: 24pt;
            margin: 0;
            font-weight: bold;
            color: #000;
            font-family: 'Outfit', sans-serif;
        }

        .header-middle {
            text-align: right;
            font-size: 10pt;
            line-height: 1.5;
            flex-grow: 1;
            padding-right: 25px;
        }

        .header-right img {
            width: 28mm;
            height: 28mm;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #eee;
        }

        /* Sections */
        section {
            margin-bottom: 0.8rem;
        }

        h2 {
            font-size: 14pt;
            color: var(--primary-color);
            font-style: italic;
            border-bottom: 2px solid var(--primary-color);
            margin-top: 0.4rem;
            margin-bottom: 0.5rem;
            padding-bottom: 2px;
        }

        /* Layout for Dates + Content */
        .entry {
            display: flex;
            margin-bottom: 0.4rem;
        }

        .date-col {
            width: var(--date-column-width);
            font-weight: bold;
            font-style: italic;
            flex-shrink: 0;
            color: #444;
        }

        .content-col {
            flex-grow: 1;
        }

        .job-header {
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 3px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            padding-left: 10px;
            font-size: 10pt;
        }

        ul {
            margin: 0.2rem 0;
            padding-left: 1.5rem;
            line-height: 1.45;
        }

        li {
            margin-bottom: 4px;
            text-align: justify;
        }

        li strong {
            color: var(--primary-color);
        }

        @media print {
            body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
                margin: 0; 
            }
            .page { width: 210mm; height: 297mm; padding: 10mm; margin: 0; border: none; box-shadow: none; overflow: hidden; }
        }
    </style>
</head>

<body>

    <div class="page" id="resume-page">
        <header>
            <div class="header-left">
                <h1 id="name">Chun-Yu, Tsai</h1>
                <div id="title" style="color:#666; font-size:12pt; margin-top:4px;">Senior Software Engineer</div>
            </div>
            <div class="header-middle">
                [CONTACT_INFO]
            </div>
            <div class="header-right">
                <img src="../src/image/profile_photo.png" alt="Profile Photo">
            </div>
        </header>

        <!-- Summary Section -->
        <section id="summary-section">
            <h2>Summary</h2>
            <div style="padding-left: 10px;">
                <p id="core-competency" style="margin:0; text-align: justify;">
                    [SUMMARY_CONTENT]
                </p>
            </div>
        </section>

        <!-- Education Section -->
        <section id="education-section">
            <h2>Education</h2>
            <div id="education-container">
                <!-- Education injected here -->
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills-section">
            <h2>Skills</h2>
            <div class="skills-grid">
                [SKILLS_LIST]
            </div>
        </section>

        <!-- Experience Section (Injected by JS) -->
        <section id="experience-section">
            <h2>Experience</h2>
            <div id="experience-container">
                <!-- Experience injected here -->
            </div>
        </section>

    </div>

</body>

</html>
