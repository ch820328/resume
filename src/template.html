<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepan Tsai - Engineering Productivity L4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Links will be relative to dist/index.html, so ../styles.css is needed if styles are in root, 
         but usually we copy assets or link to root. For simplicity, we assume styles are in root 
         and dist/index.html links to ./styles.css (we will copy or adjust link). 
         Let's stick to root styles.css for now. -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chat_widget.css">
</head>

<body>

    <nav class="nav-bar">
        <!-- Nav dots will be injected by JS or hardcoded? 
             Ideally generated by JS based on .slide count.
             The existing script.js handles logic, but we need HTML for dots.
             Let's leave a placeholder or handle it in build.js 
             Actually, script.js expects them to exist. We can generate them in build.js -->
        <!-- {{NAV_DOTS_PLACEHOLDER}} -->
    </nav>

    <div class="laser-pointer" id="laser-cursor"></div>

    <main class="slides-container">
        <!-- Slides will be injected here -->
        <!-- {{SLIDES_PLACEHOLDER}} -->
    </main>

    <!-- Chat Widget Integration -->
    <div id="chat-widget">
        <button id="chat-toggle-btn">💬</button>
        <div id="chat-window" class="hidden">
            <div id="chat-header">
                <span>Resume AI Assistant</span>
                <button id="chat-close-btn">&times;</button>
            </div>
            <div id="chat-body">
                <div class="chat-message ai-message">Hello! I'm Chun-Yu's AI assistant. Feel free to ask me anything
                    about his projects, experience, or skills.</div>
            </div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="Ask a question...">
                <button id="chat-send-btn">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="chat_widget.js"></script>
</body>

</html>
